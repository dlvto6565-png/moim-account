name: update-portfolio

# 자동 실행 시각 (GitHub는 UTC 기준). 한국시간(KST) = UTC + 9
on:
  schedule:
    - cron: "0 7 * * *"    # UTC 07:00 = KST 16:00  (국내장 마감 후)
    - cron: "0 22 * * *"   # UTC 22:00 = KST 07:00  (미국장 마감 후, 다음날 아침)
  workflow_dispatch:        # GitHub 화면에서 수동 실행 버튼

permissions:
  contents: write           # 결과 파일을 저장소에 다시 커밋하기 위해 필요

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 스냅샷 실행
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_CANO: ${{ secrets.KIS_CANO }}
          KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
          KIS_IS_REAL: "true"
        run: python kis_snapshot.py

      - name: 결과 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json history.json
          git commit -m "auto update $(date -u +%Y-%m-%dT%H:%MZ)" || echo "변경 없음"
          git push
