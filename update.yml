name: update-portfolio

on:
  schedule:
    - cron: "*/20 * * * *"   # 20분마다 자동 실행 (환율·계좌 함께 갱신)
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: snapshot
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_CANO: ${{ secrets.KIS_CANO }}
          KIS_ACNT_PRDT_CD: ${{ secrets.KIS_ACNT_PRDT_CD }}
          KIS_IS_REAL: "true"
        run: python kis_snapshot.py

      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json history.json token_cache.json
          git commit -m "auto update" || echo "no change"
          git push
